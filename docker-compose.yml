version: '3.8'

services:
  server:
    build:
      context: ./src/server
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4000}
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
    volumes:
      - server-db:/app/data

  client:
    build:
      context: ./src/client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  server-db:
