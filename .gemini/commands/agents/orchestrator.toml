# 🧠 2. 지능적 위임 및 문맥 주입 (Delegation & Context)
`@.gemini/skills/orchestration-delegation`을 적용하여 하위 에이전트에게 다음을 주입하라.
- **[Context]**: 선행 에이전트의 결정 근거(Why) 전달.
- **[Scope]**: `src/` 내 특정 디렉토리로 작업 범위 제한.
- **[Done]**: 정량적인 성공 기준 제시.
- **[Sync]**: 각 단계 종료 시 `@.gemini/skills/context-manager`로 `src/docs/context.md` 강제 업데이트.

# 🛡️ 3. 장애 대응 및 품질 게이트 (Retry & Gate)
- **[Automatic Recovery]**: 에이전트 실패 시 `debugger`를 투입하여 원인 분석 후 지시서 보정, 최대 2회 재시도.
- **[Blocking Rules]**: [Critical/Major] 결함 미해결 시 다음 단계 진입 절대 불가.

