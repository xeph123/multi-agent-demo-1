# 🚀 1. 전 생애주기 워크플로우 (Extended 8-Phase Control)
`@.gemini/skills/planning`에 따라 다음 8단계를 엄격히 관리하라.

1. **[Recon & Plan]**: 
   - `scout/researcher` 호출 -> 기술 스택 조사 및 시장 분석.
   - `pm` 호출 -> `@.gemini/skills/doc-coauthoring` 기반 `src/docs/spec.md` 확정.
   - `task-planner` 호출 -> 상세 백로그 및 일정 수립.

2. **[Architecture & Design]**: 
   - `architect` 호출 -> `api-spec.md` 및 시스템 구조 설계.
   - `designer` 호출 -> `@.gemini/skills/theme-factory` 기반 디자인 토큰 및 UI 가이드라인 수립.
   - `dba` 호출 -> 물리 DB 스키마 및 마이그레이션 전략 수립.

3. [Scaffolding & User Setup] (수동 초기 구축 및 승인): 
   - 설계(Phase 2)가 완료되는 즉시 작업을 일시 정지(Pause)하고 하위 에이전트 호출을 보류하라.
   - **[User Responsibility]**: 환경 변수 충돌 및 터미널 멈춤(Hang) 방지를 위해, **프론트엔드와 백엔드의 모든 초기 기반 환경(Scaffold)은 사용자가 직접 설치**하도록 안내하라.
   - 예시 문구: "설계가 완료되었습니다. 터미널 안정성을 위해 아래 초기 환경을 직접 구축해 주세요.
     1) 프론트엔드: `src/client` 경로에 Vite 프로젝트 설치 (예: `npm create vite@latest src/client -- --template react-ts`)
     2) 백엔드: `src/server` 경로에 기반 환경 구축 (예: `mkdir src/server; cd src/server; npm init -y` 등)
     설치가 모두 완료되면 '설치 완료'라고 말씀해 주세요."
   - 사용자의 확인(Confirm)이 있을 때까지 대기하며, 기구축된 환경 위에서만 Phase 4(구현)를 시작하라.

4. [Parallel Implementation]: (Start-Job/Wait-Job 병렬 실행)
   - [Interactive Setup]에서 확정된 초기 구축 셋업(Context)을 바탕으로,
   - `backend` 실행 -> 확정된 포트와 스택으로 비즈니스 로직 구현.
   - `frontend` 실행 -> 확정된 패키지 매니저를 사용하여 UI/UX 구현.

5. **[Infra Setup]**: 
   - `devops` 호출 -> Docker 컨테이너 및 CI/CD 환경 구축.
   - `security` 호출 -> 초기 인프라 보안 점검 및 환경변수 관리 전략 수립.

6. **[Parallel Implementation]**: (Start-Job/Wait-Job 병렬 실행)
   - `backend` 실행 -> 비즈니스 로직 및 API 구현.
   - `frontend` 실행 -> `@.gemini/skills/web-artifacts-builder` 기반 UI/UX 구현.

7. **[Code Review & Debug]**: 
   - `reviewer` 호출 -> `@.gemini/skills/quality-security-gate` 기반 코드 품질 검사.
   - `debugger` 호출 -> 발생한 빌드/런타임 에러의 RCA 분석 및 수정 지시.

8. **[Performance & Security Optimization]**: 
   - `optimizer` 호출 -> 렌더링 및 쿼리 성능 튜닝.
   - `security` 호출 -> `@.gemini/skills/security-review` 기반 최종 보안 감사.

9. **[Verification (QA)]**: 
   - `tester` 호출 -> `@.gemini/skills/qa-testing` 및 `@.gemini/skills/webapp-testing` 기반 실구동 검증.
   - `status` 호출 -> 최종 작업 완료 상태 확인 및 체크리스트 점검.

10. **[Knowledge Delivery]**: 
   - `docs` 호출 -> `pdf`, `pptx`, `docx`, `xlsx`, `slack-gif` 산출물 생성.
   - `orchestrator` 최종 승인 -> 프로젝트 종료 및 아카이빙.

# 🧠 2. 지능적 위임 및 문맥 주입 (Delegation & Context)
`@.gemini/skills/orchestration-delegation`을 적용하여 하위 에이전트에게 다음을 주입하라.
- **[Context]**: 선행 에이전트의 결정 근거(Why) 전달.
- **[Scope]**: `src/` 내 특정 디렉토리로 작업 범위 제한.
- **[Done]**: 정량적인 성공 기준 제시.
- **[Sync]**: 각 단계 종료 시 `@.gemini/skills/context-manager`로 `src/docs/context.md` 강제 업데이트.

# 🛡️ 3. 장애 대응 및 품질 게이트 (Retry & Gate)
- **[Automatic Recovery]**: 에이전트 실패 시 `debugger`를 투입하여 원인 분석 후 지시서 보정, 최대 2회 재시도.
- **[Blocking Rules]**: [Critical/Major] 결함 미해결 시 다음 단계 진입 절대 불가.

# ⚙️ 4. 실행 및 기록 표준 (Standard Ops)
- **[Delegation Ledger]**: 모든 서브에이전트 호출 전/후에 `src/logs/agent-ledger.md`에 `@.gemini/skills/orchestration-delegation`의 테이블 포맷과 **UTF-8 인코딩(한글 깨짐 방지)**을 준수하여 기록하라.
- **[Token Tracking]**: 에이전트 작업 완료 시 터미널 Usage Stats의 `P/C/T` 정보를 반드시 장부에 기입하라.
- **Command**: `"" | gemini -y -o text -p "/agents:[역할] [지시사항]"`
- **Time Log**: 모든 태스크 생성/완료 및 장부 기록 시 `Get-Date`로 실제 한국 시간을 조회하여 기록하라.
- **Task Runner**: `task-runner` 에이전트를 통해 개별 명령어 실행 상태 모니터링.

요청 사항: {{args}}
