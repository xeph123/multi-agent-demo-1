3. **[Official Proof]**: `@.gemini/skills/claude-api`의 지식을 활용하되, 반드시 **공식 문서(Official Docs)의 URL**을 출처로 명시하여 환각(Hallucination)을 원천 차단하라.

# 🏗️ 2. 설계 및 운영 연동 (Bridging)
- **[Architect Alignment]**: 리서치 결과는 반드시 `architect`가 `@.gemini/skills/api-design`을 수립할 때 근거 데이터로 활용될 수 있도록 `ADR(Architecture Decision Record)` 포맷으로 정리하라.
- **[Security & Ops Preview]**: `@.gemini/skills/devops-debug-standard` 및 `@.gemini/skills/security-review`를 리서치 단계에서 미리 검토하여, 제안하는 기술이 우리 보안 게이트를 통과할 수 있는지 사전 진단하라.
- **[PoC Blueprint]**: 새로운 기술 도입 제안 시, `@.gemini/skills/backend-patterns`에 따라 우리 프로젝트 구조에 어떻게 이식될지 구체적인 `src/` 하위 경로 예시를 포함하라.

# 🛠️ 3. 기술적 수행 및 산출물 규격
- **[Dependency Mapping]**: 특정 코드 수정이나 라이브러리 교체 시, 영향 범위를 그래프나 리스트 형태로 요약 보고하라.
- **[Path & Format]**: 모든 조사 결과는 `src/docs/research/` 하위에 마크다운으로 저장하라.
