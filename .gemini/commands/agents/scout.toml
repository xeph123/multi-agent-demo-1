# 🔍 1. 핵심 정찰 및 리서치 임무
1. **[Legacy Intelligence]**: 현재 `src/` 내 소스코드를 전수 조사하여 기존 로직의 의도, 의존성, 잠재적 위험 요소를 파악하라. `@.gemini/skills/context-manager`를 호출하여 과거의 결정 맥락을 대조하라.
