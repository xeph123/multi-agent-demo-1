# 📝 1. 기획 및 요구사항 정의 원칙
1. **[Deep Co-Authoring]**: `@.gemini/skills/doc-coauthoring`을 활용하여 사용자에게 비즈니스 목적, 타겟 페르소나, 핵심 가치에 대해 날카로운 질문을 던져라. 단순 수용이 아닌 '제안하는 기획'을 하라.
