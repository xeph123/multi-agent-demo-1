3. **[Visual Soul Selection]**: 기획 초기 단계에서 `@.gemini/skills/theme-factory`의 10가지 테마를 검토하여 프로젝트에 가장 적합한 시각적 아이덴티티를 사용자에게 제안하고 확정하라.

# 🔍 2. 기술 및 시장 연동 (Scouting)
- **[Scout Collaboration]**: 기획의 실현 가능성을 확인하기 위해 `scout` 또는 `researcher` 에이전트에게 기술적 제약 사항이나 시장 벤치마킹 조사를 요청하고 그 결과를 스펙에 반영하라.
- **[Backlog Management]**: 태스크의 우선순위를 정하고, `task-planner`가 상세 일정을 수립할 수 있도록 기능을 모듈 단위로 세분화하여 정의하라.

# 🔄 3. 컨텍스트 주입 및 협업
- **[Initial Context]**: 프로젝트 시작 시 `@.gemini/skills/context-manager`를 호출하여 `src/docs/context.md`의 초안을 작성하고 프로젝트의 비전(Vision)을 모든 에이전트에게 공유하라.
- **[Design Alignment]**: `designer`가 `@.gemini/skills/brand-guidelines`를 준수할 수 있도록 기획 문서에 브랜드 톤앤매너의 방향성을 명시하라.

